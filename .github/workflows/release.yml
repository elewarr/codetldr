name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.3.1)'
        required: true

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust/Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "third_party/tokenizers-cpp -> target"

      - name: Install dependencies
        run: brew install libomp ninja

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-macos-14

      - name: Extract version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DOpenMP_ROOT=$(brew --prefix libomp)

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -LE "agentic|integration" --timeout 60

      - name: Package tarball
        run: |
          STAGING="$RUNNER_TEMP/codetldr-staging"
          mkdir -p "$STAGING"
          cmake --install build --prefix "$STAGING" --strip
          cp LICENSE "$STAGING/"
          TARBALL_NAME="codetldr-${VERSION}-darwin-arm64.tar.gz"
          tar -czf "$RUNNER_TEMP/$TARBALL_NAME" -C "$STAGING" bin LICENSE
          echo "TARBALL=$RUNNER_TEMP/$TARBALL_NAME" >> "$GITHUB_ENV"
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 "$TARBALL" | awk '{ print $1 }')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "Tarball SHA256: $SHA256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: true

      - name: Update tap formula
        run: |
          gh workflow run update-formula.yml \
            -f version="${VERSION}" \
            -f sha256="${SHA256}" \
            -R elewarr/homebrew-codetldr
        env:
          GH_TOKEN: ${{ secrets.TAP_UPDATE_TOKEN }}
