name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust/Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "third_party/tokenizers-cpp -> target"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ matrix.os }}-semantic

      - name: Configure CMake
        run: |
          OPENMP_OPTS=""
          if [ "$RUNNER_OS" = "macOS" ]; then
            OPENMP_OPTS="-DOpenMP_ROOT=$(brew --prefix libomp)"
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCODETLDR_ENABLE_SEMANTIC_SEARCH=ON \
            $OPENMP_OPTS

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -LE "agentic|integration" --timeout 60

  release:
    name: Auto-release on main
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version from latest release
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            VERSION="0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "New version: v${VERSION}"

      - name: Trigger release workflow
        run: |
          gh workflow run release.yml \
            -f tag="v${VERSION}" \
            -R elewarr/codetldr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
